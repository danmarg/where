name: Where
options:
  bundleIdPrefix: net.af0
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  OTHER_LDFLAGS: $(inherited)
  ENABLE_PREVIEWS: NO
  LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang

targets:
  Where:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Where
    resources:
      - path: Sources/Where/Assets.xcassets
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    preBuildScripts:
      - name: Build KMP Shared XCFramework
        script: |
          cd "$SRCROOT/.."
          if [ -f .envrc ]; then
            source .envrc
          fi
          # Build BOTH to avoid switching issues
          ./gradlew :shared:assembleSharedDebugXCFramework :shared:assembleSharedReleaseXCFramework
    dependencies:
      - framework: ../shared/build/XCFrameworks/$(CONFIGURATION:lower)/Shared.xcframework
        embed: true
      - framework: Security
        embed: false
      - framework: MapKit
        embed: false
      - framework: CoreLocation
        embed: false
      - framework: CoreMotion
        embed: false
    info:
      path: Sources/Where/Info.plist
      useBaseInternationalization: true
      appIcon: AppIcon
      properties:
        NSLocationWhenInUseUsageDescription: "Where needs your location to show it on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Where needs your location in the background to keep sharing it."
        NSCameraUsageDescription: "Where needs the camera to scan friend invite QR codes."
        NSMotionUsageDescription: "Where uses motion data to optimize battery usage by reducing GPS activity when you are stationary."
        BGTaskSchedulerPermittedIdentifiers:
          - net.af0.where.heartbeat
        UIBackgroundModes:
          - fetch
          - location
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchStoryboardName: BrandLaunch
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/Where/Where.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:where.af0.net
          - applinks:where.af0.net?mode=developer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.WhereApp
      FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/XCFrameworks/$(CONFIGURATION:lower)
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      MARKETING_VERSION: "1.9"
      CURRENT_PROJECT_VERSION: 1.9

  WhereTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Where
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.WhereTests
      GENERATE_INFOPLIST_FILE: YES
