name: Where
options:
  bundleIdPrefix: net.af0
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  OTHER_LDFLAGS: $(inherited)
  ENABLE_PREVIEWS: NO
  LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang

targets:
  Where:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Where
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    dependencies:
      - framework: $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: false
        codeSign: false
        implicit: true
      - framework: Security
        embed: false
      - framework: MapKit
        embed: false
      - framework: CoreLocation
        embed: false
    info:
      path: Sources/Where/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "Where needs your location to show it on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Where needs your location in the background to keep sharing it."
        NSCameraUsageDescription: "Where needs the camera to scan friend invite QR codes."
        UIBackgroundModes:
          - location
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.Where
      FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
