name: Where
options:
  bundleIdPrefix: net.af0
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  OTHER_LDFLAGS: $(inherited)
  ENABLE_PREVIEWS: NO
  LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang

targets:
  Where:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Where
    resources:
      - path: Sources/Where/Assets.xcassets
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    preBuildScripts:
      - name: Build KMP Shared XCFramework
        script: |
          cd "$SRCROOT/.."
          if [ -f .envrc ]; then
            source .envrc
          fi
          ./gradlew :shared:assembleShared${CONFIGURATION}XCFramework
    dependencies:
      - framework: ../shared/build/XCFrameworks/$(CONFIGURATION:lower)/Shared.xcframework
        embed: true
      - framework: Security
        embed: false
      - framework: MapKit
        embed: false
      - framework: CoreLocation
        embed: false
    info:
      path: Sources/Where/Info.plist
      useBaseInternationalization: true
      appIcon: AppIcon
      properties:
        NSLocationWhenInUseUsageDescription: "Where needs your location to show it on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Where needs your location in the background to keep sharing it."
        NSCameraUsageDescription: "Where needs the camera to scan friend invite QR codes."
        BGTaskSchedulerPermittedIdentifiers:
          - net.af0.where.heartbeat
        UIBackgroundModes:
          - fetch
          - location
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sources/Where/Where.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.WhereApp
      FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/XCFrameworks/$(CONFIGURATION:lower)
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic

  WhereTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Where
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.WhereTests
      GENERATE_INFOPLIST_FILE: YES
