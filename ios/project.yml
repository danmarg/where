name: Where
options:
  bundleIdPrefix: net.af0
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  OTHER_LDFLAGS: $(inherited)
  ENABLE_PREVIEWS: NO
  LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang

targets:
  Where:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Where
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    dependencies:
      - framework: $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/Shared.framework
        embed: false
        codeSign: false
        implicit: true
      - framework: Security
        embed: false
      - framework: MapKit
        embed: false
      - framework: CoreLocation
        embed: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.Where
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Where needs your location to show it on the map."
      INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Where needs your location in the background to keep sharing it."
      INFOPLIST_KEY_NSCameraUsageDescription: "Where needs the camera to scan friend invite QR codes."
      INFOPLIST_KEY_UIBackgroundModes: location
      FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
