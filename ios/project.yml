name: Where
options:
  bundleIdPrefix: net.af0
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "6.0"
  ENABLE_USER_SCRIPT_SANDBOXING: NO
  OTHER_LDFLAGS: $(inherited)
  ENABLE_PREVIEWS: NO
  LD: $(DT_TOOLCHAIN_DIR)/usr/bin/clang

targets:
  Where:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Where
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    preBuildScripts:
      - name: Build Shared XCFramework
        script: |
          if [ -f "../.envrc" ]; then
            source "../.envrc"
          fi

          if [ -f "../gradlew" ]; then
            cd ..
            GRADLE_CMD="./gradlew"
            if command -v nix >/dev/null 2>&1 && [ -f "flake.nix" ]; then
              GRADLE_CMD="nix develop . --command ./gradlew"
            fi
            
            if [ "$CONFIGURATION" = "Release" ]; then
              $GRADLE_CMD :shared:assembleSharedReleaseXCFramework
            else
              $GRADLE_CMD :shared:assembleSharedDebugXCFramework
            fi
          fi
        inputFilePaths:
          - ../shared/src
          - ../gradle
          - ../build.gradle.kts
          - ../settings.gradle.kts
          - ../gradle/libs.versions.toml
          - ../gradlew
        outputFilePaths:
          - ../shared/build/XCFrameworks/debug/Shared.xcframework/Info.plist
          - ../shared/build/XCFrameworks/release/Shared.xcframework/Info.plist
    dependencies:
      - framework: ../shared/build/XCFrameworks/$(CONFIGURATION:lower)/Shared.xcframework
        embed: false
      - framework: Security
        embed: false
      - framework: MapKit
        embed: false
      - framework: CoreLocation
        embed: false
    info:
      path: Sources/Where/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "Where needs your location to show it on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Where needs your location in the background to keep sharing it."
        NSCameraUsageDescription: "Where needs the camera to scan friend invite QR codes."
        UIBackgroundModes:
          - location
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.Where
      FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../shared/build/XCFrameworks/$(CONFIGURATION:lower)
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic

  WhereTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Where
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: net.af0.WhereTests
      GENERATE_INFOPLIST_FILE: YES
