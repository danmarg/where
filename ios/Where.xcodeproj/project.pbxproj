			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "cd \"$SRCROOT/..\"\n\n# Use system defaults for CI environments, or local overrides if available\nexport GRADLE_USER_HOME=\"${GRADLE_USER_HOME:-$HOME/.gradle}\"\nexport KONAN_DATA_DIR=\"${KONAN_DATA_DIR:-$HOME/.konan}\"\nexport TMPDIR=\"${TMPDIR:-/tmp}\"\n\n# Ensure JAVA_HOME is set (required for gradle)\nif [ -z \"$JAVA_HOME\" ]; then\n  if command -v /usr/libexec/java_home &> /dev/null; then\n    export JAVA_HOME=$(/usr/libexec/java_home)\n  fi\nfi\n\n# Ensure SDKROOT is set for iOS SDK headers\nif [ -z \"$SDKROOT\" ]; then\n  SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)\n  [ -z \"$SDKROOT\" ] && SDKROOT=$(xcrun --sdk iphonesimulator --show-sdk-path 2>/dev/null)\nfi\nexport SDKROOT\n\n# Run with nix if available (local dev), otherwise run directly (CI)\n# Pass SDKROOT via Gradle property for cinterop compilation\nif command -v nix &> /dev/null; then\n  nix develop --command ./gradlew :shared:embedAndSignAppleFrameworkForXcode -Dios.sdk.root=\"$SDKROOT\"\nelse\n  ./gradlew :shared:embedAndSignAppleFrameworkForXcode -Dios.sdk.root=\"$SDKROOT\"\nfi\n\n# If local.gradle.kts redirects the build dir, symlink xcode-frameworks to the standard location.\nLOCAL_GRADLE=\"$SRCROOT/../local.gradle.kts\"\nEXPECTED=\"$SRCROOT/../shared/build/xcode-frameworks\"\nif [ -f \"$LOCAL_GRADLE\" ] && [ ! -d \"$EXPECTED\" ]; then\n  BUILD_DIR_PATTERN=$(grep -o '\"[^\"]*\"' \"$LOCAL_GRADLE\" | tr -d '\"' | grep where-build | head -1)\n  ACTUAL=\"${BUILD_DIR_PATTERN/\\$\\{project.name\\}/shared}\"\n  if [ -d \"$ACTUAL/xcode-frameworks\" ]; then\n    mkdir -p \"$SRCROOT/../shared/build\"\n    ln -sfn \"$ACTUAL/xcode-frameworks\" \"$EXPECTED\"\n  fi\nfi\n\n# Create symlinks from non-versioned SDK names to versioned ones for Xcode compatibility.\n# The Kotlin plugin generates frameworks in iphoneos26.4, iphonesimulator26.4, etc.,\n# but Xcode's $(SDK_NAME) resolves to just \"iphoneos\" or \"iphonesimulator\".\nFRAMEWORKS_DIR=\"$SRCROOT/../shared/build/xcode-frameworks\"\nfor config_dir in \"$FRAMEWORKS_DIR\"/Debug \"$FRAMEWORKS_DIR\"/Release; do\n  if [ -d \"$config_dir\" ]; then\n    for versioned_dir in \"$config_dir\"/*; do\n      if [ -d \"$versioned_dir\" ]; then\n        base_name=$(basename \"$versioned_dir\" | sed 's/[0-9.]*$//')\n        unversioned_link=\"$config_dir/$base_name\"\n        if [ ! -e \"$unversioned_link\" ]; then\n          ln -sfn \"$(basename \"$versioned_dir\")\" \"$unversioned_link\"\n        fi\n      fi\n    done\n  fi\ndone\n";
