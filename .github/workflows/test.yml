name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set ANDROID_HOME for Gradle
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Run shared + server tests (JVM)
        run: |
          export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
          ./gradlew :shared:jvmTest :server:test

      - name: Run Android unit tests
        run: ./gradlew :android:testDebugUnitTest

      - name: Run E2E CLI test
        run: |
          chmod +x ./e2e-test.sh
          ./e2e-test.sh

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 7

  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install libsodium (macOS)
        run: brew install libsodium

      - name: Build shared framework (Debug)
        run: ./gradlew :shared:assembleSharedDebugXCFramework --quiet

      - name: Build shared framework (Release)
        run: ./gradlew :shared:assembleSharedReleaseXCFramework --quiet

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: cd ios && xcodegen

      - name: Run iOS Unit Tests
        run: |
          cd ios
          xcodebuild test \
            -scheme Where \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 7
