name: Build Apps

on:
  push:
    tags:
      - 'v*'
      - 'test-*'
  workflow_dispatch:

env:
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Debug APK
        if: ${{ !env.IS_RELEASE }}
        run: ./gradlew :android:assembleDebug

      - name: Build Android Release APK
        if: ${{ env.IS_RELEASE }}
        run: ./gradlew :android:assembleRelease

      - name: Upload Android Debug APK
        if: ${{ !env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Android Release APK
        if: ${{ env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/build/outputs/apk/release/*.apk
          retention-days: 90

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build KMP Framework
        run: ./gradlew :shared:embedAndSignAppleFrameworkForXcode

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          curl -fL https://github.com/yonaskolb/XcodeGen/releases/download/$(curl -s https://api.github.com/repos/yonaskolb/XcodeGen/releases/latest | grep tag_name | cut -d'"' -f4)/xcodegen.zip -o /tmp/xcodegen.zip
          unzip /tmp/xcodegen.zip -d /usr/local/bin

      - name: Generate Xcode Project
        run: cd ios && xcodegen

      - name: Build iOS Debug App (device)
        if: ${{ !env.IS_RELEASE }}
        run: |
          cd ios
          xcodebuild build \
            -scheme Where \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build

      - name: Build iOS Release App (device)
        if: ${{ env.IS_RELEASE }}
        run: |
          cd ios
          xcodebuild build \
            -scheme Where \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build

      - name: Upload iOS Debug Build
        if: ${{ !env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: ios/build/Build/Products/Debug-iphoneos/Where.app
          retention-days: 30

      - name: Upload iOS Release Build
        if: ${{ env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: ios/build/Build/Products/Release-iphoneos/Where.app
          retention-days: 90
