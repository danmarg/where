name: Build iOS & Android

on:
  push:
    tags:
      - 'v*'
      - 'test-*'
  workflow_dispatch:

env:
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      - name: Decode keystore
        if: env.IS_RELEASE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/where-release-key.jks
          echo "KEYSTORE_FILE=$HOME/where-release-key.jks" >> $GITHUB_ENV

      - name: Decode Play Store key
        if: env.IS_RELEASE == 'true'
        run: |
          echo "${{ secrets.PLAY_STORE_JSON_KEY_JSON }}" > $HOME/play-store-key.json
          echo "PLAY_STORE_JSON_KEY=$HOME/play-store-key.json" >> $GITHUB_ENV

      - name: Build release AAB & upload to Play Store (internal track)
        if: env.IS_RELEASE == 'true'
        working-directory: android
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bundle exec fastlane deploy

      - name: Build debug APK
        if: env.IS_RELEASE != 'true'
        working-directory: android
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: bundle exec fastlane build_debug

      - name: Upload debug APK
        if: env.IS_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Import distribution certificate
        if: env.IS_RELEASE == 'true'
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$DIST_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/dist-cert.p12
          security import "$RUNNER_TEMP/dist-cert.p12" -P "$DIST_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build release & upload to TestFlight
        if: env.IS_RELEASE == 'true'
        working-directory: ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: bundle exec fastlane beta

      - name: Build debug (simulator)
        if: env.IS_RELEASE != 'true'
        working-directory: ios
        run: bundle exec fastlane build_debug

      - name: Upload iOS debug app
        if: env.IS_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: ios/build/Build/Products/Debug-iphonesimulator/Where.app
          retention-days: 30
