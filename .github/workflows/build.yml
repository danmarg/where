name: Build iOS & Android

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Build debug APK
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: ./gradlew :android:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 14

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          touch ios/Local.xcconfig
          cd ios && xcodegen

      - name: Build KMP shared framework
        run: ./gradlew :shared:assembleSharedDebugXCFramework

      - name: Build debug app (simulator)
        run: |
          cd ios
          xcodebuild build \
            -scheme Where \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS debug app
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: ios/build/Build/Products/Debug-iphonesimulator/Where.app
          retention-days: 14
