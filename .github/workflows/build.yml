name: Build iOS & Android

on:
  push:
    tags:
      - 'v*'
      - 'test-*'
  workflow_dispatch:

env:
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set ANDROID_HOME for Gradle
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install libsodium
        run: |
          sudo apt-get update
          sudo apt-get install -y libsodium-dev

      - name: Build Android Debug APK
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        if: ${{ !env.IS_RELEASE }}
        run: ./gradlew :android:assembleDebug

      - name: Build Android Release APK
        if: ${{ env.IS_RELEASE }}
        env:
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: ./gradlew :android:assembleRelease

      - name: Upload Android Debug APK
        if: ${{ !env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Android Release APK
        if: ${{ env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/build/outputs/apk/release/*.apk
          retention-days: 90

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: cd ios && xcodegen

      - name: Ensure SDKROOT is set for K/N cinterop
        run: |
          echo "SDKROOT=$(xcrun --sdk iphonesimulator --show-sdk-path)" >> $GITHUB_ENV

      - name: Build iOS Debug App (simulator)
        if: ${{ !env.IS_RELEASE }}
        run: |
          cd ios
          xcodebuild build \
            -scheme Where \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Build iOS Release App (simulator)
        if: ${{ env.IS_RELEASE }}
        run: |
          cd ios
          xcodebuild build \
            -scheme Where \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS Debug Build
        if: ${{ !env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-app
          path: ios/build/Build/Products/Debug-iphonesimulator/Where.app
          retention-days: 30

      - name: Upload iOS Release Build
        if: ${{ env.IS_RELEASE }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: ios/build/Build/Products/Release-iphonesimulator/Where.app
          retention-days: 90
